name: Build Multi-Platform Payloads

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk libx11-dev

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install nuitka customtkinter pystray Pillow

    - name: Build Payload (Windows)
      if: runner.os == 'Windows'
      run: |
        python -m nuitka --standalone --assume-yes-for-downloads --enable-plugin=tk-inter --windows-console-mode=disable --follow-imports --include-package=customtkinter --include-package=pystray --include-package=PIL gui.py
        Rename-Item gui.dist AutoMailer_App
        7z a -t7z -sfx -ms=on -mx=9 AutoMailer_Windows.exe AutoMailer_App

    - name: Build Payload (Linux)
      if: runner.os == 'Linux'
      run: |
        python3 -m nuitka --standalone --assume-yes-for-downloads --enable-plugin=tk-inter --follow-imports --include-package=customtkinter --include-package=pystray --include-package=PIL gui.py
        mv gui.dist AutoMailer_Linux_App
        tar -czf AutoMailer_Linux.tar.gz AutoMailer_Linux_App

    - name: Build Payload (macOS)
      if: runner.os == 'macOS'
      run: |
        python3 -m nuitka --standalone --assume-yes-for-downloads --enable-plugin=tk-inter --macos-create-app-bundle --follow-imports --include-package=customtkinter --include-package=pystray --include-package=PIL gui.py
        zip -r AutoMailer_macOS.zip gui.app

    - name: Upload Release Asset (Windows)
      if: runner.os == 'Windows'
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: AutoMailer_Windows.exe
        asset_name: AutoMailer_Windows.exe
        tag: v0.0.1
        overwrite: true
        body: |
          ## AutoMailer v0.0.1
          Simple, high-efficiency bulk email automation.
          
          ### Instructions
          1. Download the version for your OS.
          2. Extract and run the executable.
          
          It just works.

    - name: Upload Release Asset (Linux)
      if: runner.os == 'Linux'
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: AutoMailer_Linux.tar.gz
        asset_name: AutoMailer_Linux.tar.gz
        tag: v0.0.1
        overwrite: true
        body: |
          ## AutoMailer v0.0.1
          Simple, high-efficiency bulk email automation.
          
          ### Instructions
          1. Download the version for your OS.
          2. Extract and run the executable.
          
          It just works.

    - name: Upload Release Asset (macOS)
      if: runner.os == 'macOS'
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: AutoMailer_macOS.zip
        asset_name: AutoMailer_macOS.zip
        tag: v0.0.1
        overwrite: true
        body: |
          ## AutoMailer v0.0.1
          Simple, high-efficiency bulk email automation.
          
          ### Instructions
          1. Download the version for your OS.
          2. Extract and run the executable.
          
          It just works.
